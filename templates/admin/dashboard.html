<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — The Legend of D&D</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cinzel+Decorative:wght@700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c9a84c;
      --gold-dark: #a07830;
      --bg: #07060a;
      --bg-card: #0e0c14;
      --bg-row: #110f18;
      --border: rgba(180,140,255,0.13);
      --purple: #7c5cbf;
      --purple-light: #a480ff;
      --text: #ccc0e8;
      --text-dim: #6a5a8a;
      --green: #4caf7a;
      --red: #cf5050;
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      font-family: 'IM Fell English', serif;
      color: var(--text);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 50% 40% at 10% 5%, rgba(124,92,191,0.08) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Topbar ── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(7,6,10,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 1.5rem;
    }

    .topbar-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: 0.9rem;
      color: var(--purple-light);
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .btn-sair {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: 'Cinzel', serif;
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      padding: 0.4rem 0.9rem;
      border-radius: 6px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    .btn-sair:hover { color: var(--text); border-color: var(--purple); }

    /* ── Content ── */
    .content {
      max-width: 860px;
      margin: 0 auto;
      padding: 1.75rem 1.25rem;
      position: relative;
      z-index: 1;
    }

    /* ── Stats ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.85rem;
      margin-bottom: 1.75rem;
    }

    @media (max-width: 520px) { .stats-row { grid-template-columns: 1fr 1fr; } }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.1rem;
    }

    .stat-card .lbl {
      font-family: 'Cinzel', serif;
      font-size: 0.58rem;
      letter-spacing: 0.14em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }

    .stat-card .val {
      font-family: 'Cinzel', serif;
      font-size: 1.6rem;
      font-weight: 900;
      color: var(--purple-light);
    }

    /* ── Search + Add ── */
    .toolbar {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .toolbar input {
      flex: 1;
      min-width: 180px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem 0.9rem;
      color: var(--text);
      font-family: 'IM Fell English', serif;
      font-size: 0.9rem;
      outline: none;
    }

    .toolbar input:focus { border-color: var(--purple); }

    .btn-add {
      background: linear-gradient(135deg, var(--purple) 0%, #5a3a9f 100%);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      padding: 0.6rem 1.1rem;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s;
    }
    .btn-add:hover { opacity: 0.85; }

    /* ── Table ── */
    .table-wrap {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .table-head {
      display: grid;
      grid-template-columns: 1fr 1.4fr 90px 90px;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      background: rgba(124,92,191,0.05);
    }

    .table-head span {
      font-family: 'Cinzel', serif;
      font-size: 0.58rem;
      letter-spacing: 0.13em;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .user-row {
      display: grid;
      grid-template-columns: 1fr 1.4fr 90px 90px;
      padding: 0.85rem 1rem;
      border-bottom: 1px solid var(--border);
      align-items: center;
      transition: background 0.15s;
    }

    .user-row:last-child { border-bottom: none; }
    .user-row:hover { background: rgba(124,92,191,0.04); }

    .user-row .nome {
      font-size: 0.88rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding-right: 0.5rem;
    }

    .user-row .email {
      font-size: 0.78rem;
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding-right: 0.5rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      padding: 0.25rem 0.55rem;
      border-radius: 4px;
    }

    .badge.ativo   { background: rgba(76,175,122,0.12); color: var(--green); border: 1px solid rgba(76,175,122,0.25); }
    .badge.inativo { background: rgba(207,80,80,0.1);   color: var(--red);   border: 1px solid rgba(207,80,80,0.2); }

    .btn-toggle {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-dim);
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      padding: 0.35rem 0.6rem;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-toggle:hover { border-color: var(--purple-light); color: var(--purple-light); }
    .btn-toggle.loading { opacity: 0.5; pointer-events: none; }

    .empty {
      padding: 2.5rem;
      text-align: center;
      color: var(--text-dim);
      font-style: italic;
      font-size: 0.9rem;
    }

    /* ── Modal Adicionar ── */
    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-bg.show { display: flex; }

    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 2rem 1.75rem;
      width: 100%;
      max-width: 400px;
      margin: 1rem;
      box-shadow: 0 0 60px rgba(124,92,191,0.15);
    }

    .modal h3 {
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      color: var(--purple-light);
      text-transform: uppercase;
      margin-bottom: 1.25rem;
    }

    .modal .form-group { margin-bottom: 1rem; }

    .modal label {
      display: block;
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.13em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 0.35rem;
    }

    .modal input, .modal select {
      width: 100%;
      background: rgba(124,92,191,0.05);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 0.65rem 0.85rem;
      color: var(--text);
      font-family: 'IM Fell English', serif;
      font-size: 0.9rem;
      outline: none;
    }

    .modal input:focus, .modal select:focus { border-color: var(--purple); }
    .modal select option { background: #0e0c14; }

    .modal-btns {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.5rem;
    }

    .btn-cancel {
      flex: 1;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text-dim);
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      padding: 0.65rem;
      cursor: pointer;
    }

    .btn-confirm {
      flex: 1;
      background: linear-gradient(135deg, var(--purple) 0%, #5a3a9f 100%);
      border: none;
      border-radius: 7px;
      color: #fff;
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      padding: 0.65rem;
      cursor: pointer;
    }

    .modal-error {
      margin-top: 0.75rem;
      font-size: 0.8rem;
      color: var(--red);
      display: none;
      text-align: center;
    }
    .modal-error.show { display: block; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem 1.25rem;
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      color: var(--text);
      z-index: 300;
      transition: transform 0.3s ease;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.ok   { border-color: rgba(76,175,122,0.4); color: var(--green); }
    .toast.err  { border-color: rgba(207,80,80,0.4);  color: var(--red); }

    @media (max-width: 560px) {
      .table-head, .user-row { grid-template-columns: 1fr 90px 70px; }
      .table-head span:nth-child(2), .user-row .email { display: none; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">🔮 Admin — Legend of D&D</div>
  <button class="btn-sair" onclick="sair()">SAIR</button>
</div>

<div class="content">
  <div class="stats-row">
    <div class="stat-card">
      <div class="lbl">Total Usuários</div>
      <div class="val" id="stat-total">—</div>
    </div>
    <div class="stat-card">
      <div class="lbl">Com Acesso</div>
      <div class="val" id="stat-ativos" style="color:var(--green)">—</div>
    </div>
    <div class="stat-card">
      <div class="lbl">Sem Acesso</div>
      <div class="val" id="stat-inativos" style="color:var(--red)">—</div>
    </div>
  </div>

  <div class="toolbar">
    <input type="text" id="busca" placeholder="Buscar por nome ou email..." oninput="filtrar()" />
    <button class="btn-add" onclick="abrirModal()">+ ADICIONAR USUÁRIO</button>
  </div>

  <div class="table-wrap">
    <div class="table-head">
      <span>Nome</span>
      <span>Email</span>
      <span>Status</span>
      <span>Ação</span>
    </div>
    <div id="lista-usuarios">
      <div class="empty">Carregando...</div>
    </div>
  </div>
</div>

<!-- Modal Adicionar -->
<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)fecharModal()">
  <div class="modal">
    <h3>✦ Adicionar Usuário</h3>
    <div class="form-group">
      <label>UID do Firebase</label>
      <input type="text" id="novo-uid" placeholder="Cole o UID do Authentication" />
    </div>
    <div class="form-group">
      <label>Nome (opcional)</label>
      <input type="text" id="novo-nome" placeholder="Nome do jogador" />
    </div>
    <div class="form-group">
      <label>Email (opcional)</label>
      <input type="email" id="novo-email" placeholder="email@exemplo.com" />
    </div>
    <div class="form-group">
      <label>Acesso à Ficha</label>
      <select id="novo-acesso">
        <option value="true">✔ Ativo</option>
        <option value="false">✘ Inativo</option>
      </select>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="fecharModal()">CANCELAR</button>
      <button class="btn-confirm" onclick="adicionarUsuario()">SALVAR</button>
    </div>
    <div class="modal-error" id="modal-erro">Preencha o UID do usuário.</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let todosUsuarios = [];

  // ── Carrega usuários ──
  async function carregar() {
    try {
      const r = await fetch('/admin/api/usuarios');
      if (r.status === 401) { window.location.href = '/admin'; return; }
      const data = await r.json();
      todosUsuarios = data.usuarios || [];
      atualizarStats();
      renderizar(todosUsuarios);
    } catch(e) {
      document.getElementById('lista-usuarios').innerHTML = '<div class="empty">Erro ao carregar usuários.</div>';
    }
  }

  function atualizarStats() {
    const ativos   = todosUsuarios.filter(u => u.ficha_ativa).length;
    const inativos = todosUsuarios.length - ativos;
    document.getElementById('stat-total').textContent   = todosUsuarios.length;
    document.getElementById('stat-ativos').textContent  = ativos;
    document.getElementById('stat-inativos').textContent = inativos;
  }

  function renderizar(lista) {
    const el = document.getElementById('lista-usuarios');
    if (!lista.length) {
      el.innerHTML = '<div class="empty">Nenhum usuário encontrado.</div>';
      return;
    }
    el.innerHTML = lista.map(u => `
      <div class="user-row" id="row-${u.uid}">
        <div class="nome">${u.nome || '—'}</div>
        <div class="email">${u.email || u.uid}</div>
        <div>
          <span class="badge ${u.ficha_ativa ? 'ativo' : 'inativo'}">
            ${u.ficha_ativa ? '✔ ATIVO' : '✘ INATIVO'}
          </span>
        </div>
        <div>
          <button class="btn-toggle" onclick="toggleAcesso('${u.uid}', ${u.ficha_ativa})">
            ${u.ficha_ativa ? 'REVOGAR' : 'ATIVAR'}
          </button>
        </div>
      </div>
    `).join('');
  }

  function filtrar() {
    const q = document.getElementById('busca').value.toLowerCase();
    const filtrado = todosUsuarios.filter(u =>
      (u.nome  || '').toLowerCase().includes(q) ||
      (u.email || '').toLowerCase().includes(q) ||
      (u.uid   || '').toLowerCase().includes(q)
    );
    renderizar(filtrado);
  }

  // ── Toggle acesso ──
  async function toggleAcesso(uid, ativoAtual) {
    const btn = document.querySelector(`#row-${uid} .btn-toggle`);
    if (btn) btn.classList.add('loading');

    try {
      const r = await fetch('/admin/api/toggle-acesso', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ uid, ficha_ativa: !ativoAtual })
      });
      if (r.status === 401) { window.location.href = '/admin'; return; }
      const data = await r.json();
      if (data.ok) {
        const u = todosUsuarios.find(x => x.uid === uid);
        if (u) u.ficha_ativa = !ativoAtual;
        atualizarStats();
        renderizar(todosUsuarios.filter(u => {
          const q = document.getElementById('busca').value.toLowerCase();
          return !q || (u.nome||'').toLowerCase().includes(q) || (u.email||'').toLowerCase().includes(q);
        }));
        toast(!ativoAtual ? 'Acesso ativado!' : 'Acesso revogado!', !ativoAtual ? 'ok' : 'err');
      }
    } catch(e) {
      toast('Erro ao atualizar.', 'err');
    }
  }

  // ── Modal ──
  function abrirModal() {
    document.getElementById('modal-bg').classList.add('show');
    document.getElementById('novo-uid').focus();
    document.getElementById('modal-erro').classList.remove('show');
  }

  function fecharModal() {
    document.getElementById('modal-bg').classList.remove('show');
    document.getElementById('novo-uid').value = '';
    document.getElementById('novo-nome').value = '';
    document.getElementById('novo-email').value = '';
    document.getElementById('novo-acesso').value = 'true';
  }

  async function adicionarUsuario() {
    const uid    = document.getElementById('novo-uid').value.trim();
    const nome   = document.getElementById('novo-nome').value.trim();
    const email  = document.getElementById('novo-email').value.trim();
    const acesso = document.getElementById('novo-acesso').value === 'true';
    const erro   = document.getElementById('modal-erro');

    if (!uid) { erro.classList.add('show'); return; }
    erro.classList.remove('show');

    try {
      const r = await fetch('/admin/api/adicionar-usuario', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ uid, nome, email, ficha_ativa: acesso })
      });
      const data = await r.json();
      if (data.ok) {
        fecharModal();
        toast('Usuário adicionado!', 'ok');
        carregar();
      } else {
        erro.textContent = data.error || 'Erro ao salvar.';
        erro.classList.add('show');
      }
    } catch(e) {
      erro.textContent = 'Erro de conexão.';
      erro.classList.add('show');
    }
  }

  // ── Sair ──
  async function sair() {
    await fetch('/admin/api/logout', { method: 'POST' });
    window.location.href = '/admin';
  }

  // ── Toast ──
  function toast(msg, tipo = 'ok') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `toast ${tipo} show`;
    setTimeout(() => { el.className = 'toast'; }, 2800);
  }

  carregar();
</script>
</body>
</html>
