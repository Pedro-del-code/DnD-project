<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — The Legend of D&D</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cinzel+Decorative:wght@700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c9a84c;
      --gold-dark: #a07830;
      --gold-light: #e8c97a;
      --bg: #07060a;
      --bg-card: #0e0c14;
      --border: rgba(180,140,255,0.15);
      --purple: #7c5cbf;
      --purple-light: #a480ff;
      --text: #ccc0e8;
      --text-dim: #6a5a8a;
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'IM Fell English', serif;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 20%, rgba(124,92,191,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 40% 60% at 80% 80%, rgba(201,168,76,0.06) 0%, transparent 60%);
      pointer-events: none;
    }

    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(124,92,191,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,92,191,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      position: relative;
      z-index: 1;
      box-shadow: 0 0 60px rgba(124,92,191,0.1);
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 16px;
      background: radial-gradient(ellipse at top, rgba(124,92,191,0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .rune {
      font-size: 2rem;
      display: block;
      margin-bottom: 0.75rem;
      filter: drop-shadow(0 0 10px rgba(124,92,191,0.6));
    }

    h1 {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1.1rem;
      color: var(--purple-light);
      letter-spacing: 0.05em;
      margin-bottom: 0.3rem;
    }

    .subtitle {
      font-size: 0.8rem;
      color: var(--text-dim);
      font-style: italic;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin-bottom: 1.75rem;
    }

    .form-group {
      margin-bottom: 1.1rem;
    }

    label {
      display: block;
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }

    input {
      width: 100%;
      background: rgba(124,92,191,0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.7rem 0.9rem;
      color: var(--text);
      font-family: 'IM Fell English', serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--purple);
      box-shadow: 0 0 12px rgba(124,92,191,0.2);
    }

    .btn {
      width: 100%;
      margin-top: 1.5rem;
      padding: 0.8rem;
      background: linear-gradient(135deg, var(--purple) 0%, #5a3a9f 100%);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .error {
      margin-top: 1rem;
      padding: 0.6rem 0.9rem;
      background: rgba(255,80,80,0.08);
      border: 1px solid rgba(255,80,80,0.2);
      border-radius: 6px;
      font-size: 0.82rem;
      color: #ff8080;
      display: none;
      text-align: center;
    }

    .error.show { display: block; }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="card">
    <div class="header">
      <span class="rune">🔮</span>
      <h1>Painel Admin</h1>
      <p class="subtitle">The Legend of D&D</p>
    </div>
    <div class="divider"></div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="admin@email.com" />
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="senha" placeholder="••••••••" onkeydown="if(event.key==='Enter')entrar()" />
    </div>
    <button class="btn" onclick="entrar()" id="btn-entrar">⚔ ENTRAR</button>
    <div class="error" id="erro">Email ou senha incorretos.</div>
  </div>

  <script>
    function entrar() {
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;
      const btn   = document.getElementById('btn-entrar');
      const erro  = document.getElementById('erro');

      erro.classList.remove('show');

      fetch('/admin/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, senha })
      })
      .then(r => r.json())
      .then(data => {
        if (data.ok) {
          window.location.href = '/admin/dashboard';
        } else {
          erro.classList.add('show');
        }
      })
      .catch(() => { erro.classList.add('show'); });
    }
  </script>
</body>
</html>
