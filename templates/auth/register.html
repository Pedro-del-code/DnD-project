{% extends "base.html" %}
{% block title %}Criar Conta — The Legend of D&D{% endblock %}

{% block extra_head %}
<style>
  body { overflow: hidden; }

  .auth-bg {
    position: fixed; inset: 0; z-index: 0;
    background: url('/static/images/dragon-bg.jpg') center center / cover no-repeat;
    filter: brightness(0.85) saturate(1.05);
  }
  .auth-bg::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(to left, rgba(10,8,4,0.55) 0%, rgba(10,8,4,0.1) 40%, rgba(10,8,4,0.4) 100%);
  }

  .auth-wrap {
    position: relative; z-index: 2;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: flex-start;
    padding: 2rem;
  }

  .auth-panel {
    width: 100%; max-width: 420px;
    background: rgba(10,8,4,0.45);
    border: 1px solid rgba(201,168,76,0.35);
    border-radius: 12px;
    padding: 2.5rem 2rem;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    box-shadow: 0 8px 48px rgba(0,0,0,0.4), inset 0 1px 0 rgba(201,168,76,0.15);
    animation: fadeUp 0.5s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .auth-logo { text-align: center; margin-bottom: 1.75rem; }
  .auth-logo img { height: 56px; filter: drop-shadow(0 0 12px rgba(201,168,76,0.5)); }
  .auth-logo h1 {
    font-family: 'Cinzel', serif; font-size: 1.2rem; font-weight: 900;
    color: var(--gold); margin-top: 0.5rem;
    text-shadow: 0 0 20px rgba(201,168,76,0.4);
  }

  .auth-title {
    font-family: 'Cinzel', serif; font-size: 0.9rem;
    color: var(--gold-light); letter-spacing: 0.1em;
    text-align: center; margin-bottom: 1.5rem;
    text-transform: uppercase;
  }

  .btn-gold { width: 100%; margin-top: 0.5rem; }

  .auth-footer {
    text-align: center; margin-top: 1.25rem;
    font-size: 0.9rem; color: var(--text-dim);
  }
  .auth-footer a {
    color: var(--gold); text-decoration: none;
    font-family: 'Cinzel', serif; font-size: 0.82rem;
  }

  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

  @media (max-width: 500px) {
    .auth-wrap { justify-content: center; padding: 1rem; }
    .row-2 { grid-template-columns: 1fr; }
  }
</style>
{% endblock %}

{% block content %}
<div class="auth-bg"></div>

<div class="auth-wrap">
  <div class="auth-panel">
    <div class="auth-logo">
      <img src="/static/images/logo.png" alt="Logo" onerror="this.style.display='none'" />
      <h1>The Legend of D&D</h1>
    </div>

    <p class="auth-title">✦ Criar Personagem ✦</p>

    <div class="form-group">
      <label>NOME DO AVENTUREIRO</label>
      <input type="text" id="name" placeholder="Seu nome de herói" />
    </div>
    <div class="form-group">
      <label>EMAIL</label>
      <input type="email" id="email" placeholder="seu@email.com" />
    </div>
    <div class="row-2">
      <div class="form-group">
        <label>SENHA</label>
        <input type="password" id="password" placeholder="••••••••" />
      </div>
      <div class="form-group">
        <label>CONFIRMAR</label>
        <input type="password" id="confirm" placeholder="••••••••" />
      </div>
    </div>

    <button class="btn-gold" onclick="register()">⚔ CRIAR CONTA</button>

    <div class="auth-footer">
      Já tem conta? <a href="/login">← Entrar</a>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
  async function salvarSessao() {
    const token = await firebase.auth().currentUser.getIdToken();
    await fetch('/api/auth/session', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token })
    });
    window.location.href = '/dashboard';
  }

  function register() {
    const name  = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value;
    const pass  = document.getElementById('password').value;
    const conf  = document.getElementById('confirm').value;
    if (!name || !email || !pass) return showToast('Preencha todos os campos', 'error');
    if (pass !== conf) return showToast('Senhas não coincidem', 'error');
    if (pass.length < 6)  return showToast('Senha mínima 6 caracteres', 'error');

    firebase.auth().createUserWithEmailAndPassword(email, pass)
      .then(cred => cred.user.updateProfile({ displayName: name }))
      .then(salvarSessao)
      .catch(e => showToast(e.message, 'error'));
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') register(); });
</script>
{% endblock %}
