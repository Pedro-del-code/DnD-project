<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}The Legend of D&D{% endblock %}</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Cinzel:wght@400;600;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

  <style>
    :root {
      --gold:        #c9a84c;
      --gold-light:  #e8c97a;
      --gold-dark:   #8b6914;
      --bg-black:    #0a0804;
      --bg-deep:     #110e07;
      --bg-card:     rgba(20,15,5,0.88);
      --bg-card2:    rgba(30,22,8,0.92);
      --text-parch:  #e8dfc0;
      --text-dim:    #9a8a68;
      --red-blood:   #8b1a1a;
      --border:      rgba(201,168,76,0.3);
      --border-h:    rgba(201,168,76,0.7);
      --shadow-gold: 0 0 20px rgba(201,168,76,0.15);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Crimson Text', Georgia, serif;
      background: var(--bg-black);
      color: var(--text-parch);
      overflow-x: hidden;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-black); }
    ::-webkit-scrollbar-thumb { background: var(--gold-dark); border-radius: 3px; }

    /* ── Global bg texture ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse at 20% 80%, rgba(139,105,20,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(139,26,26,0.06) 0%, transparent 60%);
      pointer-events: none;
    }

    /* ── Nav ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: 64px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem;
      background: linear-gradient(180deg, rgba(10,8,4,0.98) 0%, rgba(10,8,4,0.85) 100%);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(8px);
    }

    .nav-logo {
      display: flex; align-items: center; gap: 0.75rem;
      text-decoration: none;
    }
    .nav-logo img { height: 40px; }
    .nav-logo span {
      font-family: 'Cinzel', serif;
      font-weight: 900; font-size: 1.1rem;
      color: var(--gold);
      letter-spacing: 0.05em;
      text-shadow: 0 0 12px rgba(201,168,76,0.4);
    }

    .nav-links {
      display: flex; gap: 0.25rem; list-style: none;
    }
    .nav-links a {
      font-family: 'Cinzel', serif;
      font-size: 0.78rem; letter-spacing: 0.08em;
      color: var(--text-dim);
      text-decoration: none;
      padding: 0.4rem 0.85rem;
      border-radius: 4px;
      border: 1px solid transparent;
      transition: all 0.2s;
    }
    .nav-links a:hover, .nav-links a.active {
      color: var(--gold);
      border-color: var(--border);
      background: rgba(201,168,76,0.06);
    }

    .nav-user {
      display: flex; align-items: center; gap: 0.75rem;
    }
    .nav-user span {
      font-family: 'Cinzel', serif;
      font-size: 0.8rem; color: var(--text-dim);
    }
    .btn-logout {
      font-family: 'Cinzel', serif;
      font-size: 0.75rem; color: var(--red-blood);
      background: none; border: 1px solid rgba(139,26,26,0.4);
      padding: 0.3rem 0.8rem; border-radius: 4px;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-logout:hover { background: rgba(139,26,26,0.15); border-color: var(--red-blood); }

    /* ── Page wrapper ── */
    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      padding-top: 64px;
    }

    /* ── Section header ── */
    .section-header {
      padding: 2.5rem 2rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .section-header h1 {
      font-family: 'Cinzel', serif;
      font-size: 1.8rem; font-weight: 900;
      color: var(--gold);
      text-shadow: 0 0 20px rgba(201,168,76,0.3);
      letter-spacing: 0.06em;
    }
    .section-header p {
      color: var(--text-dim); font-size: 1rem;
      font-style: italic; margin-top: 0.25rem;
    }

    /* ── Cards ── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .card:hover {
      border-color: var(--border-h);
      box-shadow: var(--shadow-gold);
    }

    /* ── Buttons ── */
    .btn-gold {
      font-family: 'Cinzel', serif;
      font-size: 0.85rem; font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--bg-black);
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 50%, var(--gold) 100%);
      border: none; border-radius: 6px;
      padding: 0.75rem 2rem;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 2px 12px rgba(201,168,76,0.3);
    }
    .btn-gold:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(201,168,76,0.5);
    }

    .btn-outline {
      font-family: 'Cinzel', serif;
      font-size: 0.82rem; letter-spacing: 0.08em;
      color: var(--gold);
      background: transparent;
      border: 1px solid var(--border-h);
      border-radius: 6px;
      padding: 0.65rem 1.5rem;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-outline:hover { background: rgba(201,168,76,0.08); }

    /* ── Forms ── */
    .form-group { margin-bottom: 1.2rem; }
    .form-group label {
      display: block;
      font-family: 'Cinzel', serif;
      font-size: 0.78rem; letter-spacing: 0.08em;
      color: var(--text-dim);
      margin-bottom: 0.4rem;
    }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.65rem 0.9rem;
      color: var(--text-parch);
      font-family: 'Crimson Text', serif;
      font-size: 1rem;
      outline: none; transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: var(--gold);
      background: rgba(201,168,76,0.04);
    }
    .form-group input::placeholder { color: var(--text-dim); }

    /* ── Divider ornament ── */
    .ornament {
      display: flex; align-items: center; gap: 1rem;
      margin: 1.5rem 0;
    }
    .ornament::before, .ornament::after {
      content: ''; flex: 1;
      height: 1px; background: var(--border);
    }
    .ornament span {
      font-family: 'Cinzel', serif;
      font-size: 0.7rem; color: var(--gold-dark);
      letter-spacing: 0.15em;
    }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 2rem; right: 2rem; z-index: 999;
      font-family: 'Cinzel', serif; font-size: 0.82rem;
      padding: 0.75rem 1.5rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg-card2);
      color: var(--gold);
      box-shadow: var(--shadow-gold);
      opacity: 0; transform: translateY(10px);
      transition: all 0.3s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.error { color: #e87474; border-color: rgba(232,116,116,0.4); }

    @media (max-width: 768px) {
      nav { padding: 0 1rem; }
      .nav-links { display: none; }
      .section-header { padding: 1.5rem 1rem 1rem; }
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  {% block nav %}{% endblock %}

  <div id="toast"></div>

  {% block content %}{% endblock %}

  <!-- Firebase Config -->
  <script src="/static/js/firebase-config.js"></script>
  <script>
    function showToast(msg, type='success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'show' + (type === 'error' ? ' error' : '');
      setTimeout(() => t.className = '', 3000);
    }
  </script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
